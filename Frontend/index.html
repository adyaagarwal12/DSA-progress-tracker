<!DOCTYPE html>
<html>

<head>

<title>DSA Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>DSA Progress Tracker</h1>

<div class="stats">

<div class="card">
<h2>Total</h2>
<p id="total">0</p>
</div>

<div class="card">
<h2>Easy</h2>
<p id="easyCount">0</p>
</div>

<div class="card">
<h2>Medium</h2>
<p id="mediumCount">0</p>
</div>

<div class="card">
<h2>Hard</h2>
<p id="hardCount">0</p>
</div>

<div class="card">
<h2>Score</h2>
<p id="score">0</p>
</div>

<div class="card">
<h2>Weekly</h2>
<p id="weeklyCount">0</p>
</div>

<div class="card">
<h2>Biweekly</h2>
<p id="biweeklyCount">0</p>
</div>

</div>
<h2>Difficulty Analytics</h2>

<div class="chart-container">

<canvas id="difficultyChart"></canvas>

</div>
<h2>Add Problem</h2>

<div class="form">

<input
id="problemName"
type="text"
placeholder="Problem Name">

<select id="difficulty">

<option>Easy</option>

<option>Medium</option>

<option>Hard</option>

</select>

<button onclick="addProblem()">

Add

</button>

</div>

<h2>Problems List</h2>

<table>

<thead>

<tr>

<th>Name</th>

<th>Difficulty</th>

<th>Action</th>

</tr>

</thead>

<tbody id="problemTable">

</tbody>

</table>

<hr>

<h2>Contest Tracker</h2>

<div class="contest-form">

<input
id="contestName"
type="text"
placeholder="Contest Name">

<select id="contestType">

<option>Weekly</option>

<option>Biweekly</option>

</select>

<input
id="contestRank"
type="number"
placeholder="Rank">

<input
id="contestSolved"
type="number"
placeholder="Solved Questions">

<button
onclick="addContest()">

Add Contest

</button>

</div>

<table>

<thead>

<tr>

<th>Contest</th>

<th>Type</th>

<th>Rank</th>

<th>Solved</th>

<th>Action</th>

</tr>

</thead>

<tbody id="contestTable">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>

</html>
